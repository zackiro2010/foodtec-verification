name: Java CD with Gradle

on:
  push:
    branches: [ master, main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build and Test
      run: ./gradlew clean build check

    - name: Package Artifacts
      run: |
        mkdir -p deploy
        cp gateway-service/build/libs/*.jar deploy/gateway-service.jar
        cp inventory-service/build/libs/*.jar deploy/inventory-service.jar

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: foodtec-services
        path: deploy/
