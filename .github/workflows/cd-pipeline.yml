name: Java CD with Gradle

on:
  push:
    branches: [ master, main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build and Test
      run: ./gradlew clean build check

    - name: Package Artifacts
      run: |
        mkdir -p deploy
        echo "Searching for JAR files..."
        ls -R gateway-service/build/libs/
        ls -R inventory-service/build/libs/
        
        GATEWAY_JAR=$(find gateway-service/build/libs/ -name "*.jar" ! -name "*-plain.jar" | head -n 1)
        INVENTORY_JAR=$(find inventory-service/build/libs/ -name "*.jar" ! -name "*-plain.jar" | head -n 1)
        
        if [ -z "$GATEWAY_JAR" ]; then echo "Gateway JAR not found"; exit 1; fi
        if [ -z "$INVENTORY_JAR" ]; then echo "Inventory JAR not found"; exit 1; fi
        
        cp "$GATEWAY_JAR" deploy/gateway-service.jar
        cp "$INVENTORY_JAR" deploy/inventory-service.jar
        
        echo "Contents of deploy directory:"
        ls -l deploy/

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: foodtec-services
        path: deploy/
